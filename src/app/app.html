<div class="todoapp">
  <h1 class="todoapp__title">todos</h1>

  <div class="todoapp__content">
    @if (!USER_ID()) {
    <app-user-warning></app-user-warning>
    } @else {
    <header className="todoapp__header">
      @if (todos().length > 0) {
      <button type="button" class="todoapp__toggle-all" [class.active]="activeToggleButton()" data-cy="ToggleAllButton"
        (click)="toggleHandler()"></button>
      }

      <form (submit)="addTodo(); $event.preventDefault()">
        <input class="todoapp__new-todo" placeholder="What needs to be done?" [value]="newTodoTitle()"
          (input)="newTodoTitle.set($any($event.target).value)" autofocus />

      </form>
    </header>

    <section class="main">
      <ul class="todo-list">

        @if (tempTodo()) {
          <div data-cy="Todo" class="todo">
            <label class="todo__status-label">
              <input data-cy="TodoStatus" type="checkbox" class="todo__status" disabled>
            </label>

            <span data-cy="TodoTitle" class="todo__title">
              {{ tempTodo()?.title }}
            </span>

            <button type="button" class="todo__remove" data-cy="TodoDelete">×</button>

            <div data-cy="TodoLoader" class="modal overlay is-active">
              <div class="modal-background has-background-white-ter"></div>
              <div class="loader"></div>
            </div>
          </div>
        }

        @for (todo of todos(); track todo.id) {
          <div
            data-cy="Todo"
            class="todo"
            [class.completed]="todo.completed"
            [class.editing]="editingId() === todo.id"
          >
            <label class="todo__status-label">
              <input
                data-cy="TodoStatus"
                type="checkbox"
                class="todo__status"
                [checked]="todo.completed"
                (change)="toggleTodo(todo)"
              >
            </label>

            @if (editingId() !== todo.id) {
              <span
                data-cy="TodoTitle"
                class="todo__title"
                (dblclick)="startEdit(todo)"
              >
                {{ todo.title }}
              </span>

              <button
                type="button"
                class="todo__remove"
                data-cy="TodoDelete"
                (click)="removeTodo(todo.id)"
              >×</button>
            } @else {
              <form (submit)="saveEdit(todo); $event.preventDefault()">
                <input
                  data-cy="TodoTitleField"
                  type="text"
                  class="todo__title-field"
                  [(ngModel)]="editTitle"
                  name="editTodoTitle"
                  (keyup.escape)="cancelEdit()"
                  (blur)="saveEdit(todo)"
                  autofocus
                >
              </form>
            }

            @if (deletedTodoIds().includes(todo.id)) {
              <div data-cy="TodoLoader" class="modal overlay is-active">
                <div class="modal-background has-background-white-ter"></div>
                <div class="loader"></div>
              </div>
            }
          </div>
        }

      </ul>
    </section>
    }
  </div>
</div>

<router-outlet></router-outlet>
